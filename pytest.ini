[pytest]
testpaths = hooks/tests tests
# tests/generated holds test-writer AC skeletons (a mix of realized tests and
# TEST_INCOMPLETE stubs). They are gated behind the `generated` marker by the
# root conftest.py collection hooks — NOT a blanket --ignore: the default run
# never descends into tests/generated, while `pytest tests/generated -m generated`
# (or --run-generated) opts them in. See docs/reference/generated-tests-policy.md
# and docs/reference/test-suite-overhaul-plan.md (Phase 3 marker gate).
markers =
    generated: opt-in test-writer AC skeletons under tests/generated/; deselected from the default run, run via `pytest tests/generated -m generated` (or --run-generated).
